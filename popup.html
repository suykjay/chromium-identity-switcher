<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Identity Switcher</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="title">Identity Switcher</div>
    <div id="site" class="site"></div>
  </header>

  <div id="content"></div>

  <template id="tpl-identity">
    <div class="identity">
      <span class="dot"></span>
      <span class="name"></span>
      <span class="active-badge" hidden>当前</span>
      <span class="spacer"></span>
      <button class="btn-switch" title="切换到此身份">切换</button>
      <button class="btn-edit icon" title="重命名">✎</button>
      <button class="btn-del icon danger" title="删除">✕</button>
    </div>
  </template>

  <script src="popup.js"></script>
</body>
</html>
